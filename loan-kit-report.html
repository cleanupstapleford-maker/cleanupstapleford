<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Kit Report</title>

<style>
    body {
        background: #f4f4f4;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: left; /* FIX: stops inputs shifting right */
    }
    .center {
        text-align: center; /* FIX: only centre logo + heading */
    }
    img.logo {
        width: 140px;
        margin-bottom: 15px;
    }
    h2 {
        color: #2a7c2a;
        margin-bottom: 10px;
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input, textarea, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }
    button {
        background: #2a7c2a;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 15px;
    }
    button:hover {
        background: #256b25;
    }
    .info-box {
        background: #e8f5e8;
        border-left: 4px solid #2a7c2a;
        padding: 10px;
        margin-top: 10px;
        font-size: 14px;
    }
</style>
</head>

<body>
<div class="container">

<div class="center">
    <img src="https://cleanupstapleford.github.io/cleanupstapleford/logo.png" class="logo" alt="Clean Up Stapleford Logo">
    <h2>Loan Kit Report</h2>
</div>

<form id="reportForm" action="YOUR_WEB_APP_URL" method="POST">

    <label>Street Name (where the bag was left)</label>
    <input type="text" name="street" required>

    <label>Kit Number</label>
    <select name="kit" required>
        <option value="">Select Kit</option>
        <option>Kit 01</option>
        <option>Kit 02</option>
        <option>Kit 03</option>
        <option>Kit 04</option>
        <option>Kit 05</option>
        <option>Kit 06</option>
        <option>Kit 07</option>
        <option>Kit 08</option>
        <option>Kit 09</option>
        <option>Kit 10</option>
    </select>

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <input type="hidden" name="lat" id="latField">
    <input type="hidden" name="lon" id="lonField">

    <button type="button" id="locButton">Use My Location</button>

    <div class="info-box">
        📍 Please wait while your location is captured.<br>
        If your device asks for permission, click <strong>Allow</strong>.
    </div>

    <button type="submit">Submit Report</button>
</form>

</div>

<script>
// Location button
document.getElementById("locButton").addEventListener("click", function() {
    navigator.geolocation.getCurrentPosition(function(pos) {
        document.getElementById("latField").value = pos.coords.latitude;
        document.getElementById("lonField").value = pos.coords.longitude;
        alert("Location captured successfully ✔️");
    }, function() {
        alert("Unable to capture location. Please ensure permissions are allowed.");
    });
});

// Handle form submission WITHOUT redirect
document.getElementById("reportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = e.target;
    const data = new FormData(form);

    fetch(form.action, {
        method: "POST",
        body: data
    })
    .then(res => res.text())
    .then(result => {
        document.querySelector(".container").innerHTML = `
            <div class="center">
                <img src="https://cleanupstapleford.github.io/cleanupstapleford/logo.png" class="logo" alt="Clean Up Stapleford Logo">
                <h2>Report Submitted ✔️</h2>
            </div>
            <p>Your email has been sent successfully.</p>
            <p>Thank you — you can now return your equipment.</p>
        `;
    })
    .catch(err => {
        alert("Something went wrong submitting your report. Please try again.");
    });
});
</script>

</body>
</html>
