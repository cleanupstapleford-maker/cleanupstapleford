<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Kit Report</title>

<style>
    body {
        background: #f4f4f4;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        color: #2a7c2a;
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input, textarea, button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        background: #2a7c2a;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 15px;
    }
    button:hover {
        background: #256b25;
    }
</style>
</head>

<body>
<div class="container">

<h2>Loan Kit Report</h2>

<form id="reportForm" action="YOUR_WEB_APP_URL" method="POST">

    <label>Kit Number</label>
    <input type="text" name="kit" required>

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <label>Photo</label>
    <input type="file" id="photoInput" accept="image/*">

    <input type="hidden" name="photo" id="photoField">
    <input type="hidden" name="lat" id="latField">
    <input type="hidden" name="lon" id="lonField">

    <button type="submit">Submit Report</button>
</form>

</div>

<script>
// Convert image to Base64
document.getElementById("photoInput").addEventListener("change", function() {
    const file = this.files[0];
    const reader = new FileReader();
    reader.onloadend = function() {
        const base64 = reader.result.split(",")[1];
        document.getElementById("photoField").value = base64;
    };
    reader.readAsDataURL(file);
});

// Get GPS location
navigator.geolocation.getCurrentPosition(function(pos) {
    document.getElementById("latField").value = pos.coords.latitude;
    document.getElementById("lonField").value = pos.coords.longitude;
});

// Handle form submission WITHOUT redirect
document.getElementById("reportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = e.target;
    const data = new FormData(form);

    fetch(form.action, {
        method: "POST",
        body: data
    })
    .then(res => res.text())
    .then(result => {
        document.querySelector(".container").innerHTML = `
            <h2>Report Submitted ✔️</h2>
            <p>Your email has been sent successfully.</p>
            <p>Thank you — you can now return your equipment.</p>
        `;
    })
    .catch(err => {
        alert("Something went wrong submitting your report. Please try again.");
    });
});
</script>

</body>
</html>
