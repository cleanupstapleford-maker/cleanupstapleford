<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Kit Report</title>

<style>
    body {
        background: #f4f4f4;
        font-family: Arial, sans-serif;
        padding: 20px;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        color: #2a7c2a;
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input, textarea, button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button {
        background: #2a7c2a;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 15px;
    }
    button:hover {
        background: #256b25;
    }
</style>
</head>

<body>
<div class="container">

<h2>Loan Kit Report</h2>

<form id="reportForm" action="YOUR_WEB_APP_URL" method="POST">

    <label>Street Name (where the bag was left)</label>
    <input type="text" name="street" required>

    <label>Kit Number</label>
    <input type="text" name="kit" required>

    <label>Notes</label>
    <textarea name="notes"></textarea>

    <input type="hidden" name="lat" id="latField">
    <input type="hidden" name="lon" id="lonField">

    <button type="button" id="locButton">Use My Location</button>
    <button type="submit">Submit Report</button>
</form>

</div>

<script>
// Location button with explanation
document.getElementById("locButton").addEventListener("click", function() {
    alert("Please wait while we capture your location. If your device shows a pop-up asking for permission, click Allow.");

    navigator.geolocation.getCurrentPosition(function(pos) {
        document.getElementById("latField").value = pos.coords.latitude;
        document.getElementById("lonField").value = pos.coords.longitude;
        alert("Location captured successfully ✔️");
    }, function() {
        alert("Unable to capture location. Please ensure permissions are allowed.");
    });
});
