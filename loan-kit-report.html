<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean Up Stapleford – Bag Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #e8f5e9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .container {
        background: white;
        width: 90%;
        max-width: 520px;
        margin-top: 40px;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        text-align: center;
        border-top: 6px solid #2e7d32;
    }

    .logo {
        width: 160px;
        margin-bottom: 10px;
    }

    h2 {
        margin-top: 0;
        color: #2e7d32;
        font-size: 26px;
    }

    .instruction-box {
        background: #f1f8e9;
        padding: 15px;
        border-left: 5px solid #66bb6a;
        text-align: left;
        margin-bottom: 20px;
        border-radius: 6px;
        font-size: 15px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        text-align: left;
        color: #1b5e20;
    }

    select, textarea, input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 15px;
        background: #fafafa;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #43a047;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 17px;
        margin-top: 20px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #2e7d32;
    }

    .kit-count {
        background: #c8e6c9;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-weight: bold;
        color: #1b5e20;
        font-size: 16px;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Your real logo -->
    <img src="https://raw.githubusercontent.com/CleanUpStapleford/cleanupstapleford/main/logo.png" class="logo" alt="Clean Up Stapleford Logo">

    <h2>Report
